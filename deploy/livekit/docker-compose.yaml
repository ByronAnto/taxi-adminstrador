services:
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    restart: unless-stopped
    # Host networking: recomendado por LiveKit para que el media WebRTC/UDP
    # no se rompa con el NAT de Docker.
    network_mode: host
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

  # Reverse proxy TLS: termina HTTPS en :443 y reenvía a LiveKit (:7880).
  # Saca y renueva el certificado Let's Encrypt automáticamente.
  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
