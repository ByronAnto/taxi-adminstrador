name: taxi_jipijapa
description: "Aplicación de gestión de taxis para la Asociación Jipijapa - Quito, Ecuador"
publish_to: 'none'
version: 1.0.0+7006

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.7
  cloud_functions: ^5.2.0
  firebase_messaging: ^15.2.4
  firebase_storage: ^12.4.4
  # firebase_app_check: ^0.3.2  # Reactivar tras configurar Play Integrity + DeviceCheck en consola

  # Local Storage de archivos
  path_provider: ^2.1.5

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^15.1.2

  # Dependency Injection
  get_it: ^9.2.1
  injectable: ^2.5.0

  # Maps & Location
  google_maps_flutter: ^2.12.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Local Storage
  shared_preferences: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Versionado (force-update)
  package_info_plus: ^8.0.2
  # Play In-App Update API: cuando la app viene del Play Store, Google
  # nos deja descargar+instalar la nueva versión SIN salir de la app
  # (flujo "immediate update" — full-screen, bloqueante, oficial).
  in_app_update: ^4.2.3

  # Network
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.4
  http: ^1.3.0

  # Audio (Walkie-Talkie) - Agora real-time streaming
  agora_rtc_engine: ^6.5.0
  # LiveKit self-hosted (migración híbrida; ver docs/.../livekit-hybrid-migration.md)
  # Fijado <2.6.0: livekit_client 2.6+ exige connectivity_plus ^7 y el proyecto
  # usa connectivity_plus ^6.1.4 (subirlo rompería connectivity_service).
  livekit_client: '>=2.5.4 <2.6.0'
  # Para controlar volumen de playback del audio remoto (Helper.setVolume).
  # Versión alineada con la que trae livekit_client transitivamente.
  flutter_webrtc: ^1.2.1
  permission_handler: ^11.4.0

  # Background / Foreground Service (Radio en segundo plano)
  flutter_foreground_task: ^8.10.0

  # UI
  flutter_svg: ^2.1.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  image_picker: ^1.1.2
  intl: ^0.20.2
  badges: ^3.1.2
  animate_do: ^3.3.4

  # Utils
  uuid: ^4.5.1
  dartz: ^0.10.1
  logger: ^2.5.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  flutter_local_notifications: ^18.0.1
  timeago: ^3.7.0
  flutter_native_splash: ^2.4.6

  # Reportes (PDF A4 + Excel)
  pdf: ^3.11.3
  printing: ^5.14.2
  syncfusion_flutter_xlsio: ^30.1.42

  # Audio playback (re-escuchar audios locales del walkie-talkie)
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.1.0
  flutter_launcher_icons: ^0.14.3

# ======================== LAUNCHER ICONS ========================
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21
  web:
    generate: false

# ======================== NATIVE SPLASH ========================
flutter_native_splash:
  color: "#1565C0"
  image: "assets/icon/app_icon.png"
  color_dark: "#0D47A1"
  image_dark: "assets/icon/app_icon.png"
  android_12:
    color: "#1565C0"
    icon_background_color: "#1565C0"
    image: "assets/icon/app_icon_foreground.png"
    color_dark: "#0D47A1"
    icon_background_color_dark: "#0D47A1"
    image_dark: "assets/icon/app_icon_foreground.png"
  ios: true
  android: true

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/icon/

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
